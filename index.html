<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>ESS Manager - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@48,400,0" rel="stylesheet"/>
  <style>
    :root {
      --primary: #136dec;
      --background-light: #f6f7f8;
      --background-dark: #101822;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-light: #e2e8f0;
      --white: #ffffff;
      --border: #cbd5e1;
    }
    .dark {
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: var(--background-light);
      color: var(--text-primary);
    }
    .dark body { background: var(--background-dark); }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
    }
    .logo-icon {
      width: 48px; height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .logo-icon span { font-size: 32px; }
    .company-name {
      font-size: 1.125rem;
      font-weight: 700;
      text-align: center;
      flex: 1;
      padding-right: 48px;
    }
    .hero {
      padding: 0 1rem;
    }
    .hero-card {
      width: 100%;
      min-height: 240px;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      background-image: url('https://images.unsplash.com/photo-1509391366360-2e959784a276?w=800&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(19, 109, 236, 0.15);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(16, 24, 35, 0.9), transparent);
    }
    .hero-content {
      position: relative;
      padding: 1.5rem;
      bottom: 0;
    }
    .hero-title {
      color: white;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .hero-subtitle {
      color: #cbd5e1;
      font-size: 1rem;
    }
    .form-container {
      padding: 1.5rem 1rem;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      color: var(--text-primary);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      margin-left: 0.25rem;
    }
    .input-wrapper {
      display: flex;
      align-items: stretch;
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .input-wrapper input {
      flex: 1;
      padding: 1rem;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 0.5rem 0 0 0.5rem;
      font-size: 1rem;
      background: var(--white);
      color: var(--text-primary);
    }
    .input-wrapper input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(19, 109, 236, 0.2);
    }
    .input-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 0.5rem 0.5rem 0;
      background: var(--white);
      color: var(--text-secondary);
    }
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(19, 109, 236, 0.2);
      transition: background 0.2s;
    }
    .login-btn:hover { background: #1156c7; }
    .version {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .footer {
      margin-top: auto;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      opacity: 0.5;
    }
    .footer-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.625rem;
      font-weight: 500;
    }
    .footer-item span:first-child { font-size: 1rem; }
    @media (prefers-color-scheme: dark) {
      body:not(.light) { background: var(--background-dark); color: var(--text-light); }
      body:not(.light) .form-label { color: #cbd5e1; }
      body:not(.light) .input-wrapper input,
      body:not(.light) .input-icon { background: #1e293b; border-color: #334155; color: #f1f5f9; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-icon">
      <span class="material-symbols-outlined">bolt</span>
    </div>
    <h2 class="company-name">台灣微網科技</h2>
    <div style="width: 48px;"></div>
  </div>
  
  <div class="hero">
    <div class="hero-card">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h2 class="hero-title">Welcome Back</h2>
        <p class="hero-subtitle">Manage your energy storage efficiently</p>
      </div>
    </div>
  </div>
  
  <div class="form-container">
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">帳號 (Username)</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Enter your username" required/>
          <div class="input-icon">
            <span class="material-symbols-outlined">person</span>
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">密碼 (Password)</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required/>
          <div class="input-icon">
            <span class="material-symbols-outlined">lock</span>
          </div>
        </div>
      </div>
      
      <button type="submit" class="login-btn">
        <span>登入 (Login)</span>
        <span class="material-symbols-outlined">login</span>
      </button>
    </form>
    
    <p class="version">Energy Management System v2.4</p>
  </div>
  
  <div class="footer">
    <div class="footer-item">
      <span class="material-symbols-outlined">security</span>
      <span>SECURE END-TO-END</span>
    </div>
    <div class="footer-item">
      <span class="material-symbols-outlined">cloud_done</span>
      <span>REAL-TIME SYNC</span>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (username === 'admin@taiwanmicrogrid.com' && password === 'Demo1234!') {
      alert('登入成功！');
      window.location.href = 'https://ess-mobile.vercel.app';
    } else {
      alert('帳號或密碼錯誤');
    }
  });
</script>
</body>
</html>
