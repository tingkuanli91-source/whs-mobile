<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ESS Manager - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#136dec",
        "background-light": "#f6f7f8",
        "background-dark": "#101822",
      },
      fontFamily: {
        "display": ["Inter", "Noto Sans TC", "sans-serif"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
    },
  },
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');

body {
  font-family: 'Inter', 'Noto Sans TC', sans-serif;
  min-height: max(884px, 100dvh);
}
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
  <!-- Header -->
  <div class="flex items-center p-4 pb-2 justify-between">
    <div class="text-primary flex size-12 shrink-0 items-center justify-center">
      <span class="material-symbols-outlined text-4xl" style="">bolt</span>
    </div>
    <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12" style="">台灣微網科技</h2>
  </div>
  
  <!-- Hero Section -->
  <div class="@container px-4 py-6">
    <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[240px] shadow-2xl shadow-primary/10 relative" data-alt="High-tech professional photography of a large-scale industrial energy storage system with solar panels and digital grid overlays" style="background-image: url('https://images.unsplash.com/photo-1509391366360-2e959784a276?w=800&q=80');">
      <div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
      <div class="relative p-6">
        <h2 class="text-white tracking-tight text-[28px] font-bold leading-tight" style="">Welcome Back</h2>
        <p class="text-slate-300 text-base font-normal leading-normal" style="">Manage your energy storage efficiently</p>
      </div>
    </div>
  </div>
  
  <!-- Login Form -->
  <div class="flex flex-col gap-6 px-4 py-4 max-w-md mx-auto w-full">
    <form id="loginForm">
      <div class="flex flex-col gap-4">
        <label class="flex flex-col w-full" style="">
          <p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 ml-1" style="">帳號 (Username)</p>
          <div class="flex w-full items-stretch rounded-lg group">
            <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] border-r-0 text-base font-normal leading-normal transition-all" placeholder="Enter your username" type="text" id="username" required=""/>
            <div class="text-slate-400 dark:text-slate-500 flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 items-center justify-center px-4 rounded-r-lg border-l-0">
              <span class="material-symbols-outlined" style="">person</span>
            </div>
          </div>
        </label>
        
        <label class="flex flex-col w-full" style="">
          <p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2 ml-1" style="">密碼 (Password)</p>
          <div class="flex w-full items-stretch rounded-lg group">
            <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-[15px] border-r-0 text-base font-normal leading-normal transition-all" placeholder="Enter your password" type="password" id="password" required=""/>
            <div class="text-slate-400 dark:text-slate-500 flex border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 items-center justify-center px-4 rounded-r-lg border-l-0">
              <span class="material-symbols-outlined" style="">lock</span>
            </div>
          </div>
        </label>
      </div>
      
      <div class="flex justify-end mt-2">
        <a class="text-primary text-sm font-medium hover:underline" href="#" style=""></a>
      </div>
      
      <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-6" style="">
        <span class="text-lg" style="">登入 (Login)</span>
        <span class="material-symbols-outlined" style="">login</span>
      </button>
    </form>
    
    <div class="mt-4 text-center">
      <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest font-semibold" style="">Energy Management System v2.4</p>
    </div>
  </div>
  
  <!-- Footer -->
  <div class="mt-auto p-6 flex justify-center gap-8 opacity-50 grayscale">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-sm" style="">security</span>
      <span class="text-[10px] font-medium" style="">SECURE END-TO-END</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-sm" style="">cloud_done</span>
      <span class="text-[10px] font-medium" style="">REAL-TIME SYNC</span>
    </div>
  </div>
  
  <div class="h-4 bg-background-light dark:bg-background-dark"></div>
</div>

<script>
  // Check system preference for dark mode
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }
  
  // Login form handler
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    // Demo credentials
    if (username === 'admin@taiwanmicrogrid.com' && password === 'Demo1234!') {
      // Success - redirect to EMS
      window.location.href = 'https://ess-mobile.vercel.app';
    } else {
      // Show error
      alert('帳號或密碼錯誤\n\nDemo 帳號: admin@taiwanmicrogrid.com\nDemo 密碼: Demo1234!');
    }
  });
</script>
</body>
</html>
